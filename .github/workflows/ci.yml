name: CI
on:
  push:
    branches: [ master ]
    paths:
      - '**/*.ps1'
      - '.github/workflows/**'
  pull_request:
    branches: [ master ]
    paths:
      - '**/*.ps1'
      - '.github/workflows/**'

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pester 3.4.0 - Windows PowerShell 5.1 only (no Core support until Pester 4.1)
          - os: windows-2025
            shell: powershell
            psVersion: "5.1"
            pesterVersion: "3.4.0"
          - os: windows-2025
            shell: pwsh
            psVersion: "7"
            pesterVersion: "3.4.0"
          - os: windows-2022
            shell: powershell
            psVersion: "5.1"
            pesterVersion: "3.4.0"
          - os: windows-2022
            shell: pwsh
            psVersion: "7"
            pesterVersion: "3.4.0"

          # Pester 5.7.1
          - os: windows-2025
            shell: powershell
            psVersion: "5.1"
            pesterVersion: "5.7.1"
          - os: windows-2025
            shell: pwsh
            psVersion: "7"
            pesterVersion: "5.7.1"
          - os: windows-2022
            shell: powershell
            psVersion: "5.1"
            pesterVersion: "5.7.1"
          - os: windows-2022
            shell: pwsh
            psVersion: "7"
            pesterVersion: "5.7.1"

          # Pester 6.0.0 (needs pwsh 7.4+, guarded in a step below)
          - os: windows-2025
            shell: powershell
            psVersion: "5.1"
            pesterVersion: "6.0.0"
          - os: windows-2025
            shell: pwsh
            psVersion: "7"
            pesterVersion: "6.0.0"
          - os: windows-2022
            shell: powershell
            psVersion: "5.1"
            pesterVersion: "6.0.0"
          - os: windows-2022
            shell: pwsh
            psVersion: "7"
            pesterVersion: "6.0.0"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} - ${{ matrix.shell }} - PS ${{ matrix.psVersion }} - Pester ${{ matrix.pesterVersion }}

    defaults:
      run:
        shell: ${{ matrix.shell }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Display OS Information
      run: |
        Write-Host "Runner OS: ${{ matrix.os }}"
        Write-Host "Shell: ${{ matrix.shell }}"
        Write-Host "PowerShell Version: $($PSVersionTable.PSVersion)"

    - name: Verify Pester/PowerShell compatibility
      run: |
        $pesterVer = [version]"${{ matrix.pesterVersion }}"
        $psVer = $PSVersionTable.PSVersion

        if ($pesterVer.Major -ge 6 -and $psVer.Major -eq 7 -and $psVer -lt [version]"7.4.0") {
          Write-Error "Pester 6+ requires PowerShell 7.4+ on pwsh. Runner has $psVer."
          exit 1
        }
        Write-Host "✅ Pester ${{ matrix.pesterVersion }} is compatible with $psVer (${{ matrix.shell }})" -ForegroundColor Green

    - name: Install Pester ${{ matrix.pesterVersion }}
      run: |
        Write-Host "Installing Pester ${{ matrix.pesterVersion }}..." -ForegroundColor Yellow
        Install-Module -Name Pester -RequiredVersion "${{ matrix.pesterVersion }}" -Force -SkipPublisherCheck -AllowClobber
        Import-Module Pester -RequiredVersion "${{ matrix.pesterVersion }}"
        $installedVersion = Get-Module -Name Pester
        Write-Host "Pester version: $($installedVersion.Version)" -ForegroundColor Green
        
    - name: Setup PVM
      run: |
        Write-Host "Setting up PVM..." -ForegroundColor Yellow
        Set-ExecutionPolicy Bypass -Scope Process -Force
        .\src\pvm.ps1 setup
        if ($LASTEXITCODE -ne 0) {
          Write-Error "PVM setup failed with exit code: $LASTEXITCODE"
          exit $LASTEXITCODE
        }
        Write-Host "✅ PVM setup completed successfully" -ForegroundColor Green
        
    - name: Debug installed Pester modules
      run: Get-Module -ListAvailable -Name Pester | Format-Table Name, Version, ModuleBase
      
    - name: Run tests
      run: |
        Write-Host "Running PVM tests with Pester ${{ matrix.pesterVersion }}..." -ForegroundColor Yellow
        Import-Module Pester -RequiredVersion "${{ matrix.pesterVersion }}"

        .\src\pvm.ps1 test --coverage=85 --sort=coverage --group=folder --shell=${{ matrix.shell }} --pester=${{ matrix.pesterVersion }}
        $exitCode = $LASTEXITCODE

        Write-Host "Test execution completed with exit code: $exitCode"

        if ($exitCode -eq 0) {
          Write-Host "✅ All tests passed successfully!" -ForegroundColor Green
        } else {
          Write-Host "❌ Tests failed with exit code: $exitCode" -ForegroundColor Red
          exit $exitCode
        }

    - name: Dump error log on failure
      if: failure()
      run: |
        $logPath = "storage\logs\error.log"
        if (Test-Path $logPath) {
          Write-Host "----- error.log -----" -ForegroundColor Red
          Get-Content $logPath -Tail 200
        } else {
          Write-Host "No error.log found at $logPath"
        }
